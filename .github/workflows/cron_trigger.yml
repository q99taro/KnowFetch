name: KnowFetch Daily Schedule

on:
  schedule:
    # 每天早上 6 點 (UTC 22:00) 觸發文章收集與寄信
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  trigger_pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up HF Space & Send POST request
        run: |
          # 1. 僅存取首頁以喚醒 Space，避免重複執行 Pipeline
          curl -s "${{ secrets.HF_SPACE_URL }}/" > /dev/null || true

          # 等待一段時間讓容器啟動
          sleep 120

          # 2. 正式觸發 Pipeline，並將逾時時間延長至 900 秒 (15 分鐘)
          curl -f -X POST "${{ secrets.HF_SPACE_URL }}/trigger-pipeline" \
               -H "Content-Type: application/json" \
               -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}" \
               -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
               --retry 3 --retry-delay 30 --max-time 900
