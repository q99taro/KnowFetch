name: KnowFetch Daily Schedule

on:
  schedule:
    - cron: "0 23 * * *"
    - cron: "0 0,4,9,13 * * 1-5"
    - cron: "0 1,13 * * 0,6"
  workflow_dispatch:

jobs:
  trigger_pipeline:
    if: github.event.schedule == '0 23 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Wake up HF Space & Send POST request
        run: |
          curl -X POST "${{ secrets.HF_SPACE_URL }}/trigger-pipeline" \
               -H "Content-Type: application/json" \
               -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}" \
               -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" || true

          sleep 120

          curl -f -X POST "${{ secrets.HF_SPACE_URL }}/trigger-pipeline" \
               -H "Content-Type: application/json" \
               -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}" \
               -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
               --retry 5 --retry-delay 30 --max-time 120

  trigger_review:
    if: github.event.schedule == '0 0,4,9,13 * * 1-5' || github.event.schedule == '0 1,13 * * 0,6' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Wake up HF Space & Send POST request
        run: |
          curl -X POST "${{ secrets.HF_SPACE_URL }}/trigger-review" \
               -H "Content-Type: application/json" \
               -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}" \
               -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" || true

          sleep 120

          curl -f -X POST "${{ secrets.HF_SPACE_URL }}/trigger-review" \
               -H "Content-Type: application/json" \
               -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}" \
               -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
               --retry 5 --retry-delay 30 --max-time 120
